name: backend-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  postgres-migration-smoke:
    name: Postgres migration smoke test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Postgres migration smoke test
        env:
          PG_TEST_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
          NEXTAUTH_SECRET: ci-test-secret-not-used-for-anything-real
        run: pytest tests/test_postgres_migrations.py -v

      - name: Run SQLite test suite
        env:
          NEXTAUTH_SECRET: ci-test-secret-not-used-for-anything-real
        run: pytest -x --ignore=tests/test_postgres_migrations.py
